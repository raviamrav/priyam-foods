<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <script src="/config.js"></script>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- SEO: Title & Description -->
    <title>Priyam Foods – Order Food via WhatsApp | Home Delivery</title>
    <meta name="description" content="Priyam Foods offers South Indian food & Ready Mix delivered to your home in Riesa, Dresden, Leipzig & Chemnitz. Order fresh Biriyani, Idli Dosa Batter Teig, Ready Mix Podi and Thokku via WhatsApp today!" />
    <meta name="keywords" content="South Indian food Riesa, South Indian food Dresden Germany, WhatsApp food order, Ready mix food Dresden Chemnitz, South Indian Podi thokku Saxony" />
    <meta name="author" content="Ravivarma Singaravelu - Priyam Foods" />

    <!-- Open Graph (for Google & social sharing previews) -->
    <meta property="og:title" content="Priyam Foods – Order Food via WhatsApp" />
    <meta property="og:description" content="Browse our menu and place your food order directly via WhatsApp. Fresh meals, fast delivery." />
    <meta property="og:url" content="https://priyamfoods.vercel.app" />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="https://priyamfoods.vercel.app/og-image.png" />

    <!-- Canonical URL -->
    <link rel="canonical" href="https://priyamfoods.vercel.app/" />

    <!-- Structured Data (Restaurant schema for Google rich results) -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "FoodEstablishment",
      "name": "Priyam Foods",
      "description": "Order fresh home-cooked meals via WhatsApp. Delivering in Riesa, Dresden, Leipzig and Chemnitz.",
      "url": "https://priyamfoods.vercel.app",
      "telephone": "+4915207287460",
      "email": "raviarmav@yahoo.com",
      "servesCuisine": "Indian",
      "hasMenu": "https://priyamfoods.vercel.app",
      "contactPoint": {
        "@type": "ContactPoint",
        "contactType": "orders",
        "telephone": "+4915207287460"
      },
      "areaServed": [
        { "@type": "City", "name": "Riesa" },
        { "@type": "City", "name": "Dresden" },
        { "@type": "City", "name": "Leipzig" },
        { "@type": "City", "name": "Chemnitz" }
      ],
      "address": {
        "@type": "PostalAddress",
        "addressLocality": "Riesa",
        "addressRegion": "Saxony",
        "addressCountry": "DE"
      }
    }
    </script>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
